# .github/workflows/deploy.yml
name: Deploy master

on:
  pull_request:
    branches:
      - master
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hostinger deployment
        run: |
          curl -X POST https://webhooks.hostinger.com/deploy/5bcfe9433978980bdf3590a539a2bdde \
          -H "Content-Type: application/json" \
          -d '{}'
