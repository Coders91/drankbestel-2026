name: Deploy master

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types:
      - closed

env:
  VITE_THEME_DIR: drankbestel-2026
  REMOTE_THEME_PATH: ~/domains/staging.drankbestel.nl/public_html/wp-content/themes/drankbestel-2026

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Trigger Hostinger deployment
        run: |
          curl -X POST https://webhooks.hostinger.com/deploy/5bcfe9433978980bdf3590a539a2bdde \
          -H "Content-Type: application/json" \
          -d '{}'

      - name: Wait for deployment to finish
        run: sleep 10

      - name: Deploy built assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: public/build/
          target: ${{ env.REMOTE_THEME_PATH }}
          overwrite: true

      - name: Clear cache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 60s
          script: |
            cd ${{ env.REMOTE_THEME_PATH }}
            wp acorn optimize:clear
            wp acorn optimize
            wp cache flush
